server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Archivos estáticos: si no existen, 404 (no servir index.html)
    location ~* \.(json|js|css|png|svg|ico|webp|woff|woff2|ttf|pdf|mjs)$ {
        try_files $uri =404;
    }

    # Rutas SPA: cualquier cosa que no sea un archivo cae en index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
